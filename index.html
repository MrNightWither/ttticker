<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>NightWither – Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0c0c10;
    width: 1080px;
    overflow: hidden;
  }

  .ticker-wrap {
    width: 100%;
    position: relative;
    overflow: hidden;
    background: #0c0c10;
    border-top: 1px solid rgba(201,168,76,0.3);
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }

  .ticker-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c 40%, #f0d080 50%, #c9a84c 60%, transparent);
    opacity: 0.6;
  }
  .ticker-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c 40%, #f0d080 50%, #c9a84c 60%, transparent);
    opacity: 0.6;
  }

  .fade-left {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, #0c0c10, transparent);
    z-index: 10; pointer-events: none;
  }
  .fade-right {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(270deg, #0c0c10, transparent);
    z-index: 10; pointer-events: none;
  }

  .ticker-track {
    display: flex;
    align-items: center;
    white-space: nowrap;
    padding: 18px 0;
    will-change: transform;
  }

  .ticker-item {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    flex-shrink: 0;
  }

  .t-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }

  .t-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #c0c0c0;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .t-text strong { color: #c9a84c; font-weight: 700; }

  .ticker-sep {
    color: rgba(201,168,76,0.4);
    font-size: 16px;
    padding: 0 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="fade-left"></div>
  <div class="fade-right"></div>
  <div class="ticker-track" id="track"></div>
</div>

<script>
  const items = [
    { icon: '🎮', text: 'Mit mir zocken? <strong>So geht\'s!</strong>' },
    { icon: '🔞', text: '<strong>18+</strong>' },
    { icon: '👤', text: '<strong>Kanal folgen</strong>' },
    { icon: '💬', text: '<strong>Kommentieren</strong>' },
    { icon: '📲', text: '<strong>Stream teilen</strong>' },
  ];

  const track = document.getElementById('track');
  const speedPx = 38;

  function buildSet() {
    const frag = document.createDocumentFragment();
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'ticker-item';
      div.innerHTML = `<span class="t-icon">${item.icon}</span><span class="t-text">${item.text}</span>`;
      frag.appendChild(div);
      const sep = document.createElement('div');
      sep.className = 'ticker-sep';
      sep.textContent = '◆';
      frag.appendChild(sep);
    });
    return frag;
  }

  for (let i = 0; i < 6; i++) track.appendChild(buildSet());

  requestAnimationFrame(() => {
    const halfWidth = track.scrollWidth / 2;
    const duration = halfWidth / speedPx;
    const style = document.createElement('style');
    style.textContent = `
      @keyframes ticker {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-${halfWidth}px); }
      }
    `;
    document.head.appendChild(style);
    track.style.animation = `ticker ${duration}s linear infinite`;
  });
</script>

</body>
</html>
